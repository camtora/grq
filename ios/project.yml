name: GRQ
options:
  bundleIdPrefix: ca.camerontora
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Set your team in Xcode (Signing & Capabilities) — left blank for the repo.
    DEVELOPMENT_TEAM: ""

targets:
  GRQ:
    type: application
    platform: iOS
    sources:
      - path: GRQ
      # The shared word + token layer is bundled as resources, so the app reads
      # the SAME source of truth as the web app (../shared). This is "no separation".
      - path: ../shared/content
        buildPhase: resources
        excludes:
          - "*.md"
      - path: ../shared/tokens.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.camerontora.grq
        PRODUCT_NAME: GRQ
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
