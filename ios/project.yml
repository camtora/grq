name: GRQ
options:
  bundleIdPrefix: ca.camerontora
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Cam's team (3WR9SN94Q4) baked in so an `xcodegen generate` doesn't wipe the
    # Signing selection each time (it formerly blanked it → "requires a development team").
    # Graham overrides locally in Xcode's Signing & Capabilities for his own device builds.
    DEVELOPMENT_TEAM: "3WR9SN94Q4"
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

# Explicit shared schemes so the names are stable (xcodegen otherwise names a scheme after
# the TARGET — "GRQNext" — not the product). Both targets get one; pick "GRQ Next" to run
# the rebuild, "GRQ" for the current shipping app.
schemes:
  GRQ:
    build:
      targets:
        GRQ: all
    run:
      config: Debug
  GRQ Next:
    build:
      targets:
        GRQNext: all
    run:
      config: Debug

targets:
  GRQ:
    type: application
    platform: iOS
    sources:
      - path: GRQ
      # The shared word + token layer is bundled as resources, so the app reads
      # the SAME source of truth as the web app (../shared). This is "no separation".
      - path: ../shared/content
        buildPhase: resources
        excludes:
          - "*.md"
      - path: ../shared/tokens.json
        buildPhase: resources
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    # Explicit Info.plist (xcodegen writes GRQ/Info.plist) — needed because the
    # GoogleSignIn redirect requires a CFBundleURLTypes scheme, which the auto-
    # generated plist can't express. The launch/orientation keys below reproduce
    # what GENERATE_INFOPLIST_FILE previously did.
    info:
      path: GRQ/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Silent (content-available) push wakes the app to clear delivered notifications
        # (D64). Kept in the yml so `xcodegen generate` doesn't drop it from the plist on regen.
        UIBackgroundModes:
          - remote-notification
        # GoogleSignIn: the iOS OAuth client id + its reversed-id URL scheme so
        # Google can redirect back into the app (docs/IOS-PLAN.md).
        GIDClientID: 848530510810-hgickglorbd8ql2kh5kcoq3q04dj1isf.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.848530510810-hgickglorbd8ql2kh5kcoq3q04dj1isf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.camerontora.grq
        PRODUCT_NAME: GRQ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"

  # GRQ Next — the ground-up UI rebuild (a SECOND app target, parallel dev). It REUSES
  # the live data + auth layer (Services), the contract models (Models), the content
  # loader (Content), and the colour palette (Theme.swift) — and builds an all-new shell
  # + design system under GRQNext/. It does NOT include the old App/Views/Components.
  # Dev bundle id ca.camerontora.grq2 so it installs alongside the shipping app; cut over
  # to ca.camerontora.grq when it's ready to become THE app. (Signing/entitlements set in
  # Xcode after `xcodegen generate`, same as the GRQ target.)
  GRQNext:
    type: application
    platform: iOS
    sources:
      - path: GRQNext
      - path: GRQ/Services
      - path: GRQ/Models
      - path: GRQ/Theme/Theme.swift
      - path: GRQ/Resources/Assets.xcassets
      - path: ../shared/content
        buildPhase: resources
        excludes:
          - "*.md"
      - path: ../shared/tokens.json
        buildPhase: resources
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: GRQNext/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        GIDClientID: 848530510810-hgickglorbd8ql2kh5kcoq3q04dj1isf.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.848530510810-hgickglorbd8ql2kh5kcoq3q04dj1isf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.camerontora.grq2
        PRODUCT_NAME: GRQ Next
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
