name: GRQ
options:
  bundleIdPrefix: ca.camerontora
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    # The rebuild ships as 2.0 (old app was 1.0/build 3). A fresh marketing version keeps
    # TestFlight build numbering clean for the new UI.
    MARKETING_VERSION: "2.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Cam's team (3WR9SN94Q4) baked in so an `xcodegen generate` doesn't wipe the
    # Signing selection each time (it formerly blanked it → "requires a development team").
    # Graham overrides locally in Xcode's Signing & Capabilities for his own device builds.
    DEVELOPMENT_TEAM: "3WR9SN94Q4"
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

# Phase F cutover (the rebuild is now THE app): one scheme, "GRQ", builds the GRQNext target
# (the new UI) at the production bundle id. The old target was retired here; its source files
# stay on disk (GRQ/App, GRQ/Views, GRQ/Theme/Components.swift — now in no target) so the
# cutover is fully reversible via git if needed. The shared layer (GRQ/Services, GRQ/Models,
# GRQ/Theme/Theme.swift, GRQ/Resources, GRQ/Info.plist, GRQ/*.entitlements) is still used.
schemes:
  GRQ:
    build:
      targets:
        GRQNext: all
    run:
      config: Debug

targets:
  # The shipping app — the ground-up UI rebuild, now at the production bundle id
  # ca.camerontora.grq (was ca.camerontora.grq2 during parallel dev). Builds an all-new
  # shell + design system under GRQNext/, reusing the live data/auth layer (GRQ/Services),
  # the contract models (GRQ/Models), the content loader, and the colour palette (Theme.swift).
  GRQNext:
    type: application
    platform: iOS
    sources:
      - path: GRQNext
      - path: GRQ/Services
      - path: GRQ/Models
      - path: GRQ/Theme/Theme.swift
      - path: GRQ/Resources/Assets.xcassets
      - path: ../shared/content
        buildPhase: resources
        excludes:
          - "*.md"
      - path: ../shared/tokens.json
        buildPhase: resources
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: GRQNext/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        GIDClientID: 848530510810-hgickglorbd8ql2kh5kcoq3q04dj1isf.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.848530510810-hgickglorbd8ql2kh5kcoq3q04dj1isf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.camerontora.grq
        PRODUCT_NAME: GRQ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
      # Push Notifications entitlement, per build config (D53). Automatic signing sees the
      # aps-environment entitlement and provisions the Push capability for ca.camerontora.grq.
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: GRQNext/GRQNext.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: GRQNext/GRQNext-Release.entitlements
