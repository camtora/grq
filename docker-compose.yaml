# version 2.4 on purpose — the host runs legacy docker-compose v1 (same as ~/infrastructure)
version: "2.4"

services:
  web:
    build: ./web
    container_name: grq-web
    restart: unless-stopped
    ports:
      - "3012:3000"
    env_file: .env
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent:
    build:
      context: ./web
      dockerfile: Dockerfile.agent
    container_name: grq-agent
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db

  chat:
    build:
      context: ./web
      dockerfile: Dockerfile.agent
    container_name: grq-chat
    restart: unless-stopped
    command: ["npx", "tsx", "agent/chat-server.ts"]
    env_file: .env
    depends_on:
      - db
    # internal only — web proxies /api/chat → chat:3014

  # Phase 3: IBKR Client Portal Gateway (headless auth + keep-alive). Reads
  # IBEAM_ACCOUNT / IBEAM_PASSWORD from .env (Graham's PAPER API username). The
  # agent reaches the gateway at https://ibeam:5000/v1/api. Internal only.
  # Won't authenticate until the creds are set — bring it up explicitly with
  # `docker-compose up -d ibeam` after the Phase 3 config (docs/IBKR-PHASE3.md).
  ibeam:
    image: voyz/ibeam:latest
    container_name: grq-ibeam
    restart: unless-stopped
    env_file: .env
    # Scoped IP allowlist (localhost + docker range, default-deny kept). NOTE: this
    # gateway build only honors LOOPBACK (127.0.0.1) and ignores ips.allow for any
    # network IP, so cross-container calls still need the loopback proxy below.
    volumes:
      - ./ibeam/conf.yaml:/srv/clientportal.gw/root/conf.yaml

  # Loopback proxy (2026-06-16): the CP gateway only accepts 127.0.0.1, so the
  # agent (a separate container) can't reach ibeam:5000 directly. This socat
  # shares ibeam's network namespace and forwards :5002 -> 127.0.0.1:5000, so the
  # gateway sees a loopback connection. The agent uses IBKR_GATEWAY_URL=
  # https://ibeam:5002. Port 5001 is taken by IBeam's own health server. Internal
  # only (no host port); reachable just by our compose-network containers.
  ibeam-proxy:
    image: alpine/socat
    container_name: grq-ibeam-proxy
    restart: unless-stopped
    network_mode: "service:ibeam"
    depends_on:
      - ibeam
    command: ["TCP-LISTEN:5002,fork,reuseaddr", "TCP:127.0.0.1:5000"]

  db:
    image: postgres:16-alpine
    container_name: grq-db
    restart: unless-stopped
    # Loopback-only on 5434 for host-side prisma CLI (db push / seed / psql).
    # Not 5432 (haymaker's postgres) or 5433 (also taken). Containers use db:5432.
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_DB: grq
      POSTGRES_USER: grq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grq-db-data:/var/lib/postgresql/data

volumes:
  grq-db-data:
