# version 2.4 on purpose — the host runs legacy docker-compose v1 (same as ~/infrastructure)
version: "2.4"

services:
  web:
    build: ./web
    container_name: grq-web
    restart: unless-stopped
    ports:
      - "3012:3000"
    env_file: .env
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent:
    build:
      context: ./web
      dockerfile: Dockerfile.agent
    container_name: grq-agent
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: grq-db
    restart: unless-stopped
    # Loopback-only on 5434 for host-side prisma CLI (db push / seed / psql).
    # Not 5432 (haymaker's postgres) or 5433 (also taken). Containers use db:5432.
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_DB: grq
      POSTGRES_USER: grq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grq-db-data:/var/lib/postgresql/data

volumes:
  grq-db-data:
